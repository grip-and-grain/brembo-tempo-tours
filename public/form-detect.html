<!-- Hidden page for Netlify form detection (SSR forms aren't parsed at deploy time) -->
<form name="tour-signup" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input name="form-name" type="hidden" value="tour-signup" />
  <input name="bot-field" />
  <input name="route" />
  <input name="tour-date" />
  <input name="first-name" />
  <input name="last-name" />
  <input name="email" />
  <input name="phone" />
  <input name="motorcycle" />
  <textarea name="message"></textarea>
</form>
